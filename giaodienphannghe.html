<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Yourself</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">





<style>
	*{box-sizing:border-box;}

	body{
		<audio id="player" controls></audio>
		margin:0;
		overflow:hidden;
		font-family:sans-serif;
		background-image:url("nen1.png");
		background-size:cover;
		background-position:center;
		background-repeat:no-repeat;}


	.overlay{
		position:fixed;
		inset:0;
		background:rgba(0,0,0,0.25);
		z-index:-1;}


	.app-container{
		max-width:375px;
		margin:auto;
		height:100vh;
		display:flex;
		justify-content:center;
		align-items:center;
		padding-top:env(safe-area-inset-top);
		padding-bottom:env(safe-area-inset-bottom);
		padding-left:10px;
		padding-right:10px;}





	.box-1 {
  		width:170px;
		height:70px;
		margin:auto;
		margin-top:100px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		text-align: center;
		transform: translateY(-230px);}



	.box-2 {
  		width:300px;
		height:150px;
		margin:auto;
		margin-top:200px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:20px;
		font-weight:600;
		color:snow;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
		transform: translateY(-430px);}


	.gif{
		width:200%;
		height:200%;
		object-fit:contain;}



	.control{
  		position:absolute;
  		top:60%;
  		left:50%;
  		transform:translateX(-50%);}


	#btn-control{
  		padding:12px 30px;
  		border:none;
  		border-radius:20px;
  		font-size:16px;
  		font-weight:600;
  		background:#ffffffcc;
		transform: translateY(-210px);}}

	

</style>
</head>





<body>
	<div class="overlay"></div>
	<div class="app-container">
	<div class="card-1">
			<div class="box-1"><img src="audio.gif" class="gif"></div>
			<div class="box-2" id="box-2"></div>
			<div class="control"><button id="btn-control">Start</button></div>
		</div>
	</div>


<script>
const box2 = document.getElementById("box-2");

let list = [];
let index = 0;

/* =========================
   LOAD DATA
========================= */
function loadData(){
  try {
    const selected = JSON.parse(localStorage.getItem("selectedList"));

    if(!selected || !selected.words){
      box2.textContent = "NO LIST SELECTED";
      return;
    }

    list = selected.words;

    console.log("SELECTED LIST:", selected.name);
    console.log("WORDS:", list);

    box2.textContent = "Start:" + list.length;

  } catch (e) {
    console.log("LOAD ERROR", e);
    box2.textContent = "LOAD ERROR";
  }
}


/* =========================
   MAIN LOOP
========================= */
async function run(){

  if(!list.length){
    box2.textContent = "EMPTY";
    return;
  }

  isPlaying = true;

  while(index < list.length && isPlaying){

    if(isPaused){
      await waitUntilResume();
    }

    const item = list[index];

    box2.textContent = item.en;

    await speak(item.en, "en-US");
    await delay(300);

    if(isPaused){
      await waitUntilResume();
    }

    await speak(item.vi, "vi-VN");
    await delay(500);

    index++;
  }

  if(index >= list.length){
    box2.textContent = "FINISH";
    isPlaying = false;
    document.getElementById("btn-control").textContent = "Start";
  }
}
/* =========================
   DELAY
========================= */
function delay(ms){
  return new Promise(r => setTimeout(r, ms));
}

/* =========================
   START (IMPORTANT iOS FIX)
========================= */
function start(){

  if(isPlaying) return;

  const u = new SpeechSynthesisUtterance(" ");
  speechSynthesis.speak(u);

  run();
}
/* =========================
   INIT
========================= */
function init(){

  loadData();

  document.addEventListener("click", start, { once: true });
  document.addEventListener("touchstart", start, { once: true });
}

init();


let isPlaying = false;
let isPaused = false;
let currentUtterance = null;


function speak(text, lang){

  return new Promise(resolve => {

    if(!text){
      resolve();
      return;
    }

    const u = new SpeechSynthesisUtterance(text);
    currentUtterance = u;

    u.lang = lang || "en-US";

    u.onend = () => resolve();
    u.onerror = () => resolve();

    speechSynthesis.speak(u);
  });
}



function waitUntilResume(){
  return new Promise(resolve => {
    const interval = setInterval(() => {
      if(!isPaused){
        clearInterval(interval);
        resolve();
      }
    }, 200);
  });
}



const btn = document.getElementById("btn-control");

btn.addEventListener("click", () => {

  if(!isPlaying){
    start();
    btn.textContent = "Pause";
    return;
  }

  if(isPaused){
    speechSynthesis.resume();
    isPaused = false;
    btn.textContent = "Pause";
  }else{
    speechSynthesis.pause();
    isPaused = true;
    btn.textContent = "Start";
  }

});

</script>
</body>
</html>
